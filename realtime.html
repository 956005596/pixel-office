<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentOS - 多智能体协作工作台</title>
    <style>
        /* ========================================
           CSS Variables & Design Tokens
           现代化深色主题 - 专业感与舒适度兼顾
           ======================================== */
        :root {
            /* ========================================
               Colors - Premium Dark Theme
               现代化深色主题配色系统
               ======================================== */
            
            /* Background Colors - 背景层级 */
            --bg-primary: #08090d;
            --bg-secondary: #0e1017;
            --bg-tertiary: #14161f;
            --bg-elevated: #1a1d28;
            --bg-card: rgba(20, 22, 31, 0.75);
            --bg-hover: rgba(255, 255, 255, 0.04);
            --bg-active: rgba(102, 126, 234, 0.12);
            
            /* Text Colors - 文字层级 */
            --text-primary: #f0f1f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --text-hint: #4b5563;
            
            /* ========================================
               Accent Colors - 现代渐变色系统
               主色调采用 Indigo -> Violet -> Purple 渐变
               ======================================== */
            --accent-primary: #6366f1;      /* Indigo 500 */
            --accent-secondary: #8b5cf6;    /* Violet 500 */
            --accent-tertiary: #a78bfa;     /* Violet 400 */
            
            /* 渐变色定义 - 多方向、多层次 */
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --accent-gradient-reverse: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 50%, #6366f1 100%);
            --accent-gradient-horizontal: linear-gradient(90deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --accent-gradient-radial: radial-gradient(ellipse at center, #8b5cf6 0%, #6366f1 100%);
            
            /* 光晕效果 - 增强发光感 */
            --accent-glow: rgba(99, 102, 241, 0.35);
            --accent-glow-strong: rgba(99, 102, 241, 0.5);
            --accent-glow-spread: 0 0 40px rgba(139, 92, 246, 0.3);
            
            /* ========================================
               Status Colors - 状态色系统
               ======================================== */
            --status-online: #22c55e;
            --status-busy: #f59e0b;
            --status-offline: #6b7280;
            --status-error: #ef4444;
            --status-info: #3b82f6;
            --status-success: #10b981;
            
            /* ========================================
               Glassmorphism - 玻璃拟态效果系统
               毛玻璃 + 光影反射 + 边框高光
               ======================================== */
            --glass-bg: rgba(20, 22, 31, 0.65);
            --glass-bg-hover: rgba(30, 32, 45, 0.75);
            --glass-bg-active: rgba(40, 42, 58, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-light: rgba(255, 255, 255, 0.12);
            --glass-border-accent: rgba(139, 92, 246, 0.2);
            --glass-blur: 24px;
            --glass-blur-heavy: 32px;
            --glass-saturate: 1.2;
            
            /* 玻璃阴影 - 模拟深度反射 */
            --glass-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            --glass-shadow-hover: 
                0 12px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            
            /* ========================================
               Typography - 字体规范系统
               ======================================== */
            
            /* Font Families */
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Monaco, Consolas, monospace;
            
            /* Font Sizes - 8px 基准倍数 */
            --font-xs: 0.75rem;      /* 12px */
            --font-sm: 0.875rem;     /* 14px */
            --font-base: 1rem;       /* 16px */
            --font-lg: 1.125rem;     /* 18px */
            --font-xl: 1.25rem;      /* 20px */
            --font-2xl: 1.5rem;      /* 24px */
            --font-3xl: 1.875rem;    /* 30px */
            --font-4xl: 2.25rem;     /* 36px */
            
            /* Line Heights - 统一行高 */
            --leading-none: 1;
            --leading-tight: 1.25;
            --leading-snug: 1.375;
            --leading-normal: 1.5;
            --leading-relaxed: 1.625;
            --leading-loose: 2;
            
            /* Font Weights - 字重层级 */
            --font-light: 300;
            --font-normal: 400;
            --font-medium: 500;
            --font-semibold: 600;
            --font-bold: 700;
            
            /* Letter Spacing - 字间距 */
            --tracking-tighter: -0.05em;
            --tracking-tight: -0.025em;
            --tracking-normal: 0;
            --tracking-wide: 0.025em;
            --tracking-wider: 0.05em;
            
            /* ========================================
               Spacing - 间距系统 (8px 倍数)
               ======================================== */
            --space-xxs: 4px;        /* 0.5x */
            --space-xs: 8px;         /* 1x */
            --space-sm: 12px;        /* 1.5x */
            --space-md: 16px;        /* 2x */
            --space-lg: 24px;        /* 3x */
            --space-xl: 32px;        /* 4x */
            --space-2xl: 48px;       /* 6x */
            --space-3xl: 64px;       /* 8x */
            
            /* Section Spacing - 区块间距 */
            --section-gap: 32px;     /* 主要区块间间距 */
            --section-gap-sm: 24px;  /* 小区块间距 */
            --section-gap-lg: 48px;  /* 大区块间距 */
            
            /* ========================================
               Border Radius - 圆角系统
               ======================================== */
            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* ========================================
               Shadows - 阴影系统
               多层阴影增强深度感
               ======================================== */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4), 0 2px 4px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5), 0 4px 8px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 24px var(--accent-glow);
            --shadow-glow-strong: 0 0 32px var(--accent-glow-strong);
            --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            
            /* ========================================
               Transitions - 过渡动画系统
               ======================================== */
            --transition-instant: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            
            /* ========================================
               Z-Index - 层级管理系统
               ======================================== */
            --z-base: 0;
            --z-dropdown: 100;
            --z-sticky: 200;
            --z-modal: 300;
            --z-popover: 400;
            --z-tooltip: 500;
        }

        /* ========================================
           Base Styles & Reset
           ======================================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Background Decoration - 背景装饰光晕 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 500px 300px at 80% 70%, rgba(139, 92, 246, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(167, 139, 250, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 20s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Custom Scrollbar - 优雅滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-full);
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
            background-clip: padding-box;
        }

        /* ========================================
           Layout - Glassmorphism Grid
           ======================================== */
        .app {
            display: grid;
            grid-template-columns: 220px 1fr 380px;
            grid-template-rows: 56px 1fr;
            grid-template-areas:
                "header header header"
                "sidebar workspace chat";
            height: 100vh;
            gap: 1px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            position: relative;
            z-index: 1;
        }

        /* ========================================
           Header - Premium Glass Effect
           ======================================== */
        .header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-xl);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
            opacity: 0.5;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .header-logo {
            width: 44px;
            height: 44px;
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: var(--shadow-glow-strong);
            position: relative;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .header-logo::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: var(--accent-gradient);
            border-radius: calc(var(--radius-md) + 2px);
            z-index: -1;
            opacity: 0;
            filter: blur(8px);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        @keyframes logoGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-xs) var(--space-md);
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--status-online);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .connection-status::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .connection-status:hover::before {
            opacity: 1;
        }

        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
            color: var(--status-error);
        }

        .connection-status.reconnecting {
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.2);
            color: var(--status-busy);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            position: relative;
            animation: statusPulse 2s ease-in-out infinite;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid currentColor;
            opacity: 0.3;
            animation: statusRing 2s ease-in-out infinite;
        }

        .connection-status.disconnected .status-dot,
        .connection-status.reconnecting .status-dot {
            animation: none;
        }

        .connection-status.disconnected .status-dot::after,
        .connection-status.reconnecting .status-dot::after {
            animation: none;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        @keyframes statusRing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 0; }
        }

        .header-time {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        /* ========================================
           Sidebar - Agent List (Elegant)
           ======================================== */
        .sidebar {
            grid-area: sidebar;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 220px;
            max-width: 260px;
            border-right: 1px solid var(--glass-border);
        }

        .sidebar-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .online-count {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: var(--space-xxs) var(--space-sm);
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
        }

        /* Agent Item - Enhanced Design with Glassmorphism */
        .agent-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            margin-bottom: var(--space-xs);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .agent-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity var(--transition-normal);
            border-radius: 0 3px 3px 0;
        }

        .agent-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .agent-item:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-accent);
            transform: translateX(4px);
            box-shadow: var(--glass-shadow-hover), 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .agent-item:hover::before {
            opacity: 0.6;
        }

        .agent-item:hover::after {
            opacity: 0.03;
        }

        .agent-item.active {
            background: var(--glass-bg-active);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow-strong), var(--glass-shadow-hover);
        }

        .agent-item.active::before {
            opacity: 1;
        }

        .agent-item.active::after {
            opacity: 0.06;
        }

        .agent-item.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .agent-item.loading::before {
            content: '';
            position: absolute;
            right: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            position: relative;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all var(--transition-normal);
        }

        .agent-item:hover .agent-avatar {
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.05);
        }

        .agent-item.active .agent-avatar {
            border-color: var(--accent-primary);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .agent-status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
            transition: all var(--transition-normal);
        }

        .agent-status-indicator::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid currentColor;
            opacity: 0;
            animation: indicatorPulse 2s ease-out infinite;
        }

        .agent-status-indicator.online {
            background: var(--status-online);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .agent-status-indicator.online::after {
            border-color: var(--status-online);
        }

        .agent-status-indicator.busy {
            background: var(--status-busy);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            animation: busyPulse 1.5s ease-in-out infinite;
        }

        .agent-status-indicator.busy::after {
            border-color: var(--status-busy);
        }

        .agent-status-indicator.offline {
            background: var(--status-offline);
        }

        .agent-status-indicator.offline::after {
            animation: none;
        }

        @keyframes indicatorPulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        @keyframes busyPulse {
            0%, 100% {
                box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            }
            50% {
                box-shadow: 0 0 16px rgba(245, 158, 11, 0.8);
            }
        }

        .agent-info {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .agent-role {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all var(--transition-fast);
        }

        .agent-status-badge.online {
            background: rgba(34, 197, 94, 0.12);
            color: var(--status-online);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .agent-status-badge.busy {
            background: rgba(245, 158, 11, 0.12);
            color: var(--status-busy);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .agent-status-badge.offline {
            background: rgba(107, 114, 128, 0.12);
            color: var(--text-muted);
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        /* ========================================
           Workspace - Main Content
           ======================================== */
        .workspace {
            grid-area: workspace;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }

        .workspace-header {
            padding: var(--space-sm) var(--space-md);
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            min-height: 44px;
        }

        .workspace-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--space-xl);
            right: var(--space-xl);
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }

        .workspace-title {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .workspace-actions {

        .empty-state-text {

            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            backdrop-filter: blur(12px);

            box-shadow: var(--shadow-lg);
        }

        .agent-detail-header {
            padding: var(--space-xl) var(--space-2xl);

            gap: var(--space-xl);
            position: relative;

        .agent-detail-header::before {

            left: 0;

        }

            height: 88px;

            background: var(--bg-elevated);

            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            border: 2px solid rgba(99, 102, 241, 0.3);
            box-shadow: var(--shadow-glow), var(--shadow-md);
            position: relative;
            animation: avatarPulse 3s ease-in-out infinite;
        }

        .agent-detail-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: calc(var(--radius-lg) + 4px);
            background: var(--accent-gradient);
            opacity: 0;
            filter: blur(12px);
            z-index: -1;
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes avatarGlow {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }

        .agent-detail-info h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: var(--space-xxs);
            letter-spacing: -0.02em;
        }

        .agent-detail-role {
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            font-size: 0.95rem;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .skill-tag {
            padding: var(--space-xxs) var(--space-md);
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent-primary);

        /* Task Progress - Enhanced */

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

        .progress-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }

        .progress-value {
            font-size: 1.35rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-bottom: var(--space-lg);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: var(--radius-full);
            transition: width var(--transition-slow);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .task-stages {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .stage-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-md);
            border-left: 3px solid transparent;
            transition: all var(--transition-normal);
            position: relative;
        }

        .stage-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            border-radius: var(--radius-md);
            transition: opacity var(--transition-fast);
        }

        .stage-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .stage-item:hover::before {
            opacity: 0.02;
        }

        .stage-item.completed {
            border-left-color: var(--status-online);
            opacity: 0.65;
        }

        .stage-item.active {
            border-left-color: var(--accent-primary);
            background: var(--bg-active);
        }

        .stage-item.active::before {
            opacity: 0.05;
        }

        .stage-item.pending {
            border-left-color: rgba(255, 255, 255, 0.08);
            opacity: 0.45;
        }

        .stage-icon {
            font-size: 1.25rem;
            transition: transform var(--transition-fast);
        }

        .stage-item:hover .stage-icon {
            transform: scale(1.1);
        }

        .stage-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .stage-status {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .stage-item.active .stage-status {
            color: var(--accent-primary);
        }

        /* Interaction Area - Modern Design */
        .interaction-area {
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .interaction-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            letter-spacing: -0.01em;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        /* Buttons - Premium Style with Glow Effects */
        .btn {
            padding: var(--space-sm) var(--space-md);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            position: relative;
            overflow: hidden;
        }

        /* Ripple Effect */
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            transform: scale(0);
            opacity: 0;
            transition: transform 0.5s, opacity 0.3s;
        }

        .btn:active::after {
            transform: scale(2);
            opacity: 0;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
            border: 1px solid transparent;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            filter: blur(12px);
            z-index: -1;
            transition: opacity var(--transition-fast);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5), 0 0 32px rgba(139, 92, 246, 0.25);
        }

        .btn-primary:hover::before {
            opacity: 0.5;
        }

        .btn-primary:active {
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: var(--accent-gradient);
            border-radius: inherit;
            opacity: 0;
            z-index: -1;
            transition: opacity var(--transition-fast);
        }

        .btn-secondary:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-accent);
            box-shadow: var(--shadow-md), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .btn-secondary:hover::before {
            opacity: 0.15;
        }

        .btn-secondary:active {
            box-shadow: var(--shadow-sm);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--status-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
        }

        .btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn.loading::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: var(--space-sm);
        }

        .message-input-area {
            display: flex;
            gap: var(--space-sm);
            padding: var(--space-sm);
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-input {
            flex: 1;
            padding: var(--space-sm) var(--space-md);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--transition-normal);
            height: 40px;
            position: relative;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12), 0 0 20px rgba(99, 102, 241, 0.15);
            background: rgba(0, 0, 0, 0.4);
            animation: inputGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes inputGlow {
            0% {
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12), 0 0 20px rgba(99, 102, 241, 0.15);
            }
            100% {
                box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15), 0 0 25px rgba(139, 92, 246, 0.2);
            }
        }

        .message-input::placeholder {
            color: var(--text-hint);
            animation: placeholderFade 2s ease-in-out infinite;
        }

        .message-input:focus::placeholder {
            animation: placeholderSlide 0.8s ease-out forwards;
        }

        @keyframes placeholderFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        @keyframes placeholderSlide {
            0% {
                opacity: 0.8;
                transform: translateX(0);
            }
            100% {
                opacity: 0.3;
                transform: translateX(5px);
            }
        }

        /* ========================================
           Chat Panel - Premium Design
           ======================================== */
        .chat-panel {
            grid-area: chat;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid var(--glass-border);
        }

        .chat-header {
            padding: var(--space-sm) var(--space-lg);
            background: rgba(255, 255, 255, 0.02);

            justify-content: space-between;
            min-height: 48px;
        }

        .chat-title {
            font-weight: 600;

            align-items: center;
            gap: var(--space-sm);
            font-size: 0.95rem;
        }

        .chat-sync-status {

            color: var(--text-muted);

        }

        .chat-actions {
            display: flex;
            gap: var(--space-xxs);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-sm) var(--space-md);
            /* 自适应高度，填满剩余空间 */
        }

        /* Message Cards - Enhanced Animation with Glassmorphism */
        .message-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xs);

            transition: all var(--transition-normal);
            animation: messageSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);

            box-shadow: var(--glass-shadow);
        }

        @keyframes messageSlideIn {
            0% {
                opacity: 0;
                transform: translateX(30px) scale(0.95);
            }
            60% {
                transform: translateX(-5px) scale(1.01);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .message-card:hover {
            border-color: var(--glass-border-light);
            transform: translateY(-3px);
            box-shadow: var(--glass-shadow-hover), 0 8px 24px rgba(0, 0, 0, 0.25);

        .message-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 50%);

        .message-card-header {
            padding: var(--space-sm) var(--space-md);

            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);

        .message-card-name {
            font-weight: 600;
            font-size: 0.9rem;

        .message-card-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .message-card-type {
            font-size: 0.7rem;

        }

            font-weight: 500;

        .message-card-btn:hover {

        /* Task Board - Enhanced with Glassmorphism */

            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
            max-height: 80px;
            overflow-y: auto;
        }

            padding: var(--space-md) var(--space-lg);

            justify-content: space-between;
            align-items: center;

            background: var(--glass-bg-hover);

        .task-item-title {

        }

            content: '';
            position: absolute;

            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.2), transparent);
        }

            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            letter-spacing: -0.01em;
        }

        .topology-svg {
            width: 100%;
            height: 220px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .topology-node {
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .topology-node:hover {
            filter: brightness(1.15);
        }

        .topology-node:hover .node-circle {
            r: 24;
        }

        .node-circle {
            transition: all var(--transition-normal);
        }

        .node-label {
            font-size: 13px;
            fill: var(--text-primary);
            text-anchor: middle;
            font-weight: 500;
            pointer-events: none;
        }

        .node-sublabel {
            font-size: 10px;
            fill: var(--text-muted);
            text-anchor: middle;
            pointer-events: none;
        }

        .topology-link {
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 2;
            fill: none;
            transition: all var(--transition-normal);
        }

        .topology-link.active {
            stroke: var(--accent-primary);
            stroke-width: 3;
            animation: linkPulse 2s infinite;
        }

        @keyframes linkPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .node-glow {
            fill: none;
            stroke-width: 24;
            opacity: 0;
            animation: glowPulse 2.5s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.25; }
        }

        /* ========================================
           Toast Notifications - Premium Style
           ======================================== */
        .toast-container {
            position: fixed;
            top: 88px;
            right: var(--space-xl);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .toast {
            padding: var(--space-md) var(--space-lg);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            animation: toastSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(120px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .toast.success { border-left: 4px solid var(--status-online); }
        .toast.error { border-left: 4px solid var(--status-error); }
        .toast.warning { border-left: 4px solid var(--status-busy); }
        .toast.info { border-left: 4px solid var(--accent-primary); }

        .toast-icon {
            font-size: 1.3rem;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .toast-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ========================================
           Loading States - Skeleton
           ======================================== */
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.08) 50%,

            );

            border-radius: var(--radius-sm);

        /* ========================================
           Responsive Adjustments

        @media (max-width: 1400px) {

    <script>
        /**

         * ========================================
         */

        // ========================================

        // ========================================
        const CONFIG = {

            WS_URL: 'ws://localhost:3101',

        };

        const AGENT_SKILLS = {

        const STAGE_TEMPLATES = {

            ],

            ]
        };

        // ========================================
        // Utility Functions
        // ========================================
        const utils = {
            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            debounce(fn, delay) {
                let timer = null;
                return function(...args) {
                    if (timer) clearTimeout(timer);
                    timer = setTimeout(() => {
                        fn.apply(this, args);
                        timer = null;
                    }, delay);
                };
            },

            throttle(fn, limit) {
                let inThrottle = false;
                return function(...args) {
                    if (!inThrottle) {
                        fn.apply(this, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                };
            },

            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            },

            formatTime(date = new Date()) {
                return date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            },

            hashObject(obj) {
                return JSON.stringify(obj).split('').reduce((a, b) => {
                    a = ((a << 5) - a) + b.charCodeAt(0);
                    return a & a;
                }, 0).toString(16);
            }
        };

        // ========================================
        // Toast Notification System
        // ========================================
        const toast = {
            container: null,

            init() {
                this.container = document.getElementById('toast-container');
            },

            show(type, title, message, duration = 3000) {
                if (!this.container) return;

                const icons = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                };

                const toastEl = document.createElement('div');
                toastEl.className = `toast ${type}`;
                toastEl.innerHTML = `
                    <span class="toast-icon">${icons[type]}</span>
                    <div class="toast-content">
                        <div class="toast-title">${utils.escapeHtml(title)}</div>
                        ${message ? `<div class="toast-message">${utils.escapeHtml(message)}</div>` : ''}
                    </div>
                `;

                this.container.appendChild(toastEl);

                setTimeout(() => {
                    toastEl.style.opacity = '0';
                    toastEl.style.transform = 'translateX(120px) scale(0.95)';
                    setTimeout(() => toastEl.remove(), 300);
                }, duration);
            },

            success(title, message) { this.show('success', title, message); },
            error(title, message) { this.show('error', title, message); },
            warning(title, message) { this.show('warning', title, message); },
            info(title, message) { this.show('info', title, message); }
        };

        // ========================================
        // WebSocket Manager with Reconnection
        // ========================================
        class WebSocketManager {
            constructor(url) {
                this.url = url;
                this.ws = null;
                this.isConnected = false;
                this.reconnectAttempts = 0;
                this.reconnectTimer = null;
                this.messageQueue = [];
                this.handlers = new Map();
            }

            connect() {
                try {
                    this.ws = new WebSocket(this.url);
                    this.bindEvents();
                } catch (error) {
                    console.error('WebSocket connection failed:', error);
                    this.scheduleReconnect();
                }
            }

            bindEvents() {
                this.ws.onopen = () => {
                    console.log('WebSocket connected');
                    this.isConnected = true;
                    this.reconnectAttempts = 0;
                    this.flushQueue();
                    this.emit('connected');
                };

                this.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        this.emit('message', data);
                    } catch (error) {
                        console.error('Failed to parse message:', error);
                    }
                };

                this.ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    this.isConnected = false;
                    this.emit('disconnected');
                    this.scheduleReconnect();
                };

                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.emit('error', error);
                };
            }

            scheduleReconnect() {
                if (this.reconnectTimer) return;

                this.reconnectAttempts++;
                const delay = Math.min(
                    CONFIG.WS_RECONNECT_INTERVAL * Math.pow(1.5, this.reconnectAttempts - 1),
                    30000
                );

                this.emit('reconnecting', { attempt: this.reconnectAttempts, delay });

                this.reconnectTimer = setTimeout(() => {
                    this.reconnectTimer = null;
                    if (this.reconnectAttempts < CONFIG.WS_MAX_RECONNECT_ATTEMPTS) {
                        this.connect();
                    } else {
                        this.emit('reconnect_failed');
                    }
                }, delay);
            }

            send(data) {
                const message = JSON.stringify(data);
                if (this.isConnected) {
                    this.ws.send(message);
                } else {
                    this.messageQueue.push(message);
                }
            }

            flushQueue() {
                while (this.messageQueue.length > 0 && this.isConnected) {
                    this.ws.send(this.messageQueue.shift());
                }
            }

            on(event, handler) {
                if (!this.handlers.has(event)) {
                    this.handlers.set(event, new Set());
                }
                this.handlers.get(event).add(handler);
            }

            off(event, handler) {
                if (this.handlers.has(event)) {
                    this.handlers.get(event).delete(handler);
                }
            }

            emit(event, data) {
                if (this.handlers.has(event)) {
                    this.handlers.get(event).forEach(handler => {
                        try {
                            handler(data);
                        } catch (error) {
                            console.error('Event handler error:', error);
                        }
                    });
                }
            }

            disconnect() {
                if (this.reconnectTimer) {
                    clearTimeout(this.reconnectTimer);
                    this.reconnectTimer = null;
                }
                if (this.ws) {
                    this.ws.close();
                }
            }
        }

        // ========================================
        // State Management
        // ========================================
        class StateManager {
            constructor() {
                this.state = {
                    agents: [],
                    selectedAgent: null,
                    messages: [],
                    tasks: [],
                    connectionStatus: 'connecting',
                    userId: null
                };
                this.cache = {
                    agentsHash: null,
                    messagesHash: null
                };
                this.subscribers = new Map();
            }

            get(key) {
                return key ? this.state[key] : this.state;
            }

            set(key, value) {
                const oldValue = this.state[key];
                this.state[key] = value;
                this.notify(key, value, oldValue);
            }

            update(key, updater) {
                const newValue = updater(this.state[key]);
                this.set(key, newValue);
            }

            subscribe(key, callback) {
                if (!this.subscribers.has(key)) {
                    this.subscribers.set(key, new Set());
                }
                this.subscribers.get(key).add(callback);

                return () => {
                    this.subscribers.get(key).delete(callback);
                };
            }

            notify(key, newValue, oldValue) {
                if (this.subscribers.has(key)) {
                    this.subscribers.get(key).forEach(callback => {
                        try {
                            callback(newValue, oldValue);
                        } catch (error) {
                            console.error('Subscriber error:', error);
                        }
                    });
                }
            }

            hasChanged(key, newValue) {
                const hash = utils.hashObject(newValue);
                if (this.cache[`${key}Hash`] === hash) {
                    return false;
                }
                this.cache[`${key}Hash`] = hash;
                return true;
            }
        }

        // ========================================
        // Storage Manager
        // ========================================
        const storage = {
            get(key, defaultValue = null) {
                try {

                    const item = localStorage.getItem(`agentos:${key}`);
                    return item ? JSON.parse(item) : defaultValue;
                } catch {
                    return defaultValue;
                }
            },

            set(key, value) {
                try {
                    localStorage.setItem(`agentos:${key}`, JSON.stringify(value));
                } catch (error) {
                    console.error('Storage error:', error);
                }
            },

            remove(key) {
                try {
                    localStorage.removeItem(`agentos:${key}`);
                } catch (error) {
                    console.error('Storage error:', error);
                }
            },

            getUserId() {
                let userId = this.get('userId');
                if (!userId) {
                    userId = `user_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                    this.set('userId', userId);
                }
                return userId;
            }
        };

        // ========================================

                this.elements = {
                    agentList: document.getElementById('agent-list'),

            renderAgentList(agents, selectedAgent) {

            }

            renderWorkspace(agent) {
                const container = this.elements.workspaceContent;

                                    agent.status === 'busy' ? '#f59e0b' : '#6b7280';
