                    <div style="padding: 16px; display: flex; flex-direction: column; gap: 12px;">
                        <!-- Agent 基本信息 -->
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 48px; height: 48px; border-radius: 12px; background: var(--glass-bg); 
                                        display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
                                        border: 2px solid ${statusColor};">
                                ${utils.escapeHtml(agent.icon)}
                            </div>
                            <div style="flex: 1;">
                                <div style="font-weight: 600; font-size: 1rem; margin-bottom: 2px;">${utils.escapeHtml(agent.name)}</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">${utils.escapeHtml(agent.role)}</div>
                                <div style="display: flex; align-items: center; gap: 4px; margin-top: 4px;">
                                    <span style="width: 6px; height: 6px; border-radius: 50%; background: ${statusColor};"></span>
                                    <span style="font-size: 0.75rem; color: ${statusColor};">${statusText}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 技能标签 -->
                        <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                            ${agent.skills.slice(0, 3).map(s => `
                                <span style="padding: 3px 8px; background: rgba(99, 102, 241, 0.15); 
                                            border: 1px solid rgba(99, 102, 241, 0.25); border-radius: 12px;
                                            font-size: 0.7rem; color: var(--accent-primary);">${utils.escapeHtml(s)}</span>
                            `).join('')}
                        </div>
                        
                        <!-- 快捷操作 -->
                        <div style="display: flex; gap: 8px; margin-top: 4px;">
                            <button class="btn btn-primary" data-action="quick" data-message="请帮我分析一下" 
                                    style="flex: 1; padding: 8px; font-size: 0.8rem;">📋 分配任务</button>
                            <button class="btn btn-secondary" data-action="quick" data-message="请汇报进度"
                                    style="flex: 1; padding: 8px; font-size: 0.8rem;">📊 进度</button>
                        </div>
                        
                        ${agent.task ? `
                            <div style="padding: 10px; background: var(--glass-bg); border-radius: 8px; border-left: 3px solid var(--accent-primary);">
                                <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;">当前任务</div>
                                <div style="font-size: 0.85rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    ${utils.escapeHtml(agent.task)}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            renderTopologySection(agent) {
                return `
                    <div class="topology-section">
                        <div class="topology-title">🔗 协作关系</div>
                        ${this.renderTopologySVG(agent)}
                    </div>
                `;
            }

            renderTopologySVG(centerAgent) {
                const collaborations = {
                    main: ['assistant', 'coder', 'architect', 'researcher', 'editor'],
                    coder: ['architect', 'researcher'],
                    architect: ['researcher', 'coder'],
                    researcher: ['editor'],
                    editor: ['main'],
                    assistant: ['main']
                };

                const collabs = collaborations[centerAgent.id] || [];
                const connectedAgents = this.state.get('agents').filter(a => collabs.includes(a.id));

                const centerX = 200;
                const centerY = 110;
                const radius = 80;

                const nodes = connectedAgents.map((agent, index) => {
                    const angle = (index / connectedAgents.length) * 2 * Math.PI - Math.PI / 2;
                    return {
                        ...agent,
                        x: centerX + radius * Math.cos(angle),
                        y: centerY + radius * Math.sin(angle)
                    };
                });

                const links = nodes.map(node => `
                    <line class="topology-link ${node.status === 'busy' ? 'active' : ''}"
                          x1="${centerX}" y1="${centerY}" x2="${node.x}" y2="${node.y}"/>
                `).join('');

                const nodeElements = nodes.map(node => `
                    <g class="topology-node" data-agent-id="${utils.escapeHtml(node.id)}">
                        ${node.status === 'busy' ? `<circle class="node-glow" cx="${node.x}" cy="${node.y}" r="28" stroke="#6366f1"/>` : ''}
                        <circle class="node-circle" cx="${node.x}" cy="${node.y}" r="22"
                                fill="${node.status === 'offline' ? '#14161f' : '#1e2030'}"
                                stroke="${node.status === 'busy' ? '#6366f1' : node.status === 'idle' ? '#22c55e' : '#3a3d4d'}"
                                stroke-width="2"/>
                        <text x="${node.x}" y="${node.y + 5}" class="node-label">${utils.escapeHtml(node.icon)}</text>
                        <text x="${node.x}" y="${node.y + 20}" class="node-sublabel">${utils.escapeHtml(node.name)}</text>
                    </g>
                `).join('');

                const centerNode = `
                    <g class="topology-node">
                        <circle class="node-glow" cx="${centerX}" cy="${centerY}" r="32" stroke="#6366f1"/>
                        <circle class="node-circle" cx="${centerX}" cy="${centerY}" r="30"
                                fill="#1a1d2e" stroke="#6366f1" stroke-width="3"/>
                        <text x="${centerX}" y="${centerY + 5}" class="node-label" style="font-size: 17px;">${utils.escapeHtml(centerAgent.icon)}</text>
                        <text x="${centerX}" y="${centerY + 24}" class="node-sublabel" style="fill: #6366f1;">${utils.escapeHtml(centerAgent.name)}</text>
                    </g>
                `;

                return `<svg class="topology-svg" viewBox="0 0 400 220">${links}${nodeElements}${centerNode}</svg>`;
            }

            renderTaskProgress(progress) {
                return `
                    <div class="task-progress">
                        <div class="progress-header">
                            <span class="progress-title">📊 任务进度</span>
                            <span class="progress-value">${progress.overall}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress.overall}%"></div>
                        </div>
                        <div class="task-stages">
                            ${progress.stages.map(stage => `
                                <div class="stage-item ${stage.status}">
                                    <span class="stage-icon">${stage.icon}</span>
                                    <span class="stage-name">${utils.escapeHtml(stage.name)}</span>
                                    <span class="stage-status">${stage.progress}%</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            renderEmptyState() {
                return `
                    <div class="topology-section" style="text-align: center; padding: 48px;">
                        <div style="font-size: 3.5rem; margin-bottom: 20px;">☕</div>
                        <div style="color: var(--text-secondary); font-size: 1rem;">当前空闲，等待任务分配</div>
                    </div>
                `;
            }

            renderInteractionArea(agent) {
                return `
                    <div class="interaction-area">
                        <div class="interaction-title">快速交互</div>
                        <div class="quick-actions">
                            <button class="btn btn-secondary" data-action="quick" data-message="请帮我分析一下这个需求">📋 分配任务</button>
                            <button class="btn btn-secondary" data-action="quick" data-message="请汇报当前进度">📊 查看进度</button>
                            <button class="btn btn-secondary" data-action="quick" data-message="请提供设计建议">💡 征求建议</button>
                        </div>
                        <div class="message-input-area">
                            <input type="text" class="message-input" id="message-input" placeholder="输入消息...">
                            <button class="btn btn-primary" data-action="send">发送</button>
                        </div>
                    </div>
                `;
            }

            generateTaskProgress(agent) {
                if (!agent.task) return { overall: 0, stages: [] };

                const stages = STAGE_TEMPLATES[agent.id] || [
                    { name: '准备阶段', progress: 100, status: 'completed' },
                    { name: '执行阶段', progress: 50, status: 'active' },
                    { name: '完成阶段', progress: 0, status: 'pending' }
                ];

                const iconMap = { completed: '✅', active: '🔄', pending: '⏳' };
                stages.forEach(s => { s.icon = iconMap[s.status]; });

                const overall = Math.round(stages.reduce((sum, s) => sum + s.progress, 0) / stages.length);

                return { overall, stages };
            }

            renderMessages(messages) {
                const container = this.elements.chatMessages;
                if (!container) return;

                if (messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-text">暂无消息</div>
                        </div>
                    `;
                    return;
                }

                const fragment = document.createDocumentFragment();

                messages.forEach(msg => {
                    const type = this.detectMessageType(msg.text);
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.innerHTML = `
                        <div class="message-card-header">
                            <div class="message-card-user">
                                <div class="message-card-avatar">${utils.escapeHtml(msg.icon)}</div>
                                <div>
                                    <div class="message-card-name">${utils.escapeHtml(msg.sender)}</div>
                                    <div class="message-card-time">${utils.escapeHtml(msg.time)}</div>
                                </div>
                            </div>
                            <span class="message-card-type ${type}">${this.getMessageTypeLabel(type)}</span>
                        </div>
                        <div class="message-card-body">
                            <div class="message-card-text">${utils.escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
                            <div class="message-card-actions">
                                <button class="message-card-btn" data-action="copy" data-text="${utils.escapeHtml(msg.text).replace(/"/g, '&quot;')}">复制</button>
                                <button class="message-card-btn" data-action="reply" data-sender="${utils.escapeHtml(msg.sender)}">回复</button>
                            </div>
                        </div>
                    `;
                    fragment.appendChild(card);
                });

                container.innerHTML = '';
                container.appendChild(fragment);
                container.scrollTop = container.scrollHeight;
            }

            async renderTasks() {
                const container = this.elements.taskList;
                if (!container) return;

                try {
                    // Fetch tasks from API
                    const tasks = await api.fetchTasks();
                    
                    // Filter active tasks (pending, running)
                    const activeTasks = tasks.filter(t => 
                        t.status === 'pending' || t.status === 'running' || t.status === 'in_progress'
                    );

                    this.elements.taskCount.textContent = `${activeTasks.length} 个任务`;

                    if (activeTasks.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state" style="padding: 20px;">
                                <div class="empty-state-text">暂无活跃任务</div>
                            </div>
                        `;
                        return;
                    }

                    // Status icons
                    const statusIcons = {
                        pending: '⏳',
                        in_progress: '🔄',
                        running: '🔄',
                        completed: '✅',
                        failed: '❌'
                    };

                    // Calculate progress based on status
                    const getProgress = (status) => {
                        switch (status) {
                            case 'completed': return 100;
                            case 'running':
                            case 'in_progress': return 60;
                            case 'pending': return 10;
                            case 'failed': return 0;
                            default: return 0;
                        }
                    };

                    container.innerHTML = activeTasks.map(task => {
                        const statusIcon = statusIcons[task.status] || '⏳';
                        const progress = getProgress(task.status);
                        const agent = this.state.get('agents').find(a => a.id === task.agentId);
                        const agentIcon = agent ? agent.icon : '🤖';
                        const agentName = agent ? agent.name : task.agentId;

                        return `
                            <div class="task-item">
                                <div class="task-item-header">
                                    <span class="task-item-title">${statusIcon} ${utils.escapeHtml(task.message?.substring(0, 30) || '无标题')}${task.message?.length > 30 ? '...' : ''}</span>
                                    <span class="task-item-assignee">${utils.escapeHtml(agentIcon)} ${utils.escapeHtml(agentName)}</span>
                                </div>
                                <div class="task-item-progress">
                                    <div class="task-item-progress-fill" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } catch (error) {
                    console.error('渲染任务列表失败:', error);
                    container.innerHTML = `
                        <div class="empty-state" style="padding: 20px;">
                            <div class="empty-state-text">加载任务失败</div>
                        </div>
                    `;
                }
            }

            updateConnectionStatus(status) {
                const el = this.elements.connectionStatus;
                if (!el) return;

                const dot = el.querySelector('.status-dot');
                const text = el.querySelector('.status-text');

                el.className = `connection-status ${status}`;

                const labels = {
                    connected: '已连接',
                    disconnected: '已断开',
                    reconnecting: '重连中...',
                    connecting: '连接中...'
                };

                text.textContent = labels[status] || status;
            }

            detectMessageType(text) {
                if (text.includes('✅') || text.includes('完成') || text.includes('成功')) return 'success';
                if (text.includes('❌') || text.includes('失败') || text.includes('错误')) return 'error';
                if (text.includes('⚠️') || text.includes('警告')) return 'warning';
                return 'info';
            }

            getMessageTypeLabel(type) {
                const labels = { success: '成功', error: '错误', warning: '警告', info: '信息' };
                return labels[type] || '信息';
            }
        }

        // ========================================
        // API Client
        // ========================================
        const api = {
            async fetchAgents() {
                try {
                    const response = await fetch(`${CONFIG.API_BASE}/api/agents`);
                    const data = await response.json();
                    return data.agents.map(a => ({
                        ...a,
                        skills: AGENT_SKILLS[a.id] || []
                    }));
                } catch (error) {
                    console.error('Failed to fetch agents:', error);
                    return this.getDefaultAgents();
                }
            },

            async sendMessage(agentId, message, userId) {
                try {
                    const response = await fetch(`${CONFIG.API_BASE}/api/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ agentId, message, userId })
                    });
                    const data = await response.json();
                    return !data.error;
                } catch (error) {
                    console.error('Failed to send message:', error);
                    return false;
                }
            },

            async clearMessages() {
                try {
                    await fetch(`${CONFIG.API_BASE}/api/messages`, { method: 'DELETE' });
                    return true;
                } catch (error) {
                    console.error('Failed to clear messages:', error);
                    return false;
                }
            },

            async fetchTasks() {
                try {
                    const response = await fetch(`${CONFIG.API_BASE}/api/tasks`);
                    const data = await response.json();
                    return data.tasks || [];
                } catch (error) {
                    console.error('Failed to fetch tasks:', error);
                    return [];
                }
            },

            getDefaultAgents() {
                return [
                    { id: 'main', name: '小松', icon: '🐿️', status: 'offline', role: '主 Agent', skills: AGENT_SKILLS.main },
                    { id: 'assistant', name: '管家', icon: '🤵', status: 'offline', role: '日程管理', skills: AGENT_SKILLS.assistant },
                    { id: 'coder', name: '工程师', icon: '💻', status: 'offline', role: '代码开发', skills: AGENT_SKILLS.coder },
                    { id: 'architect', name: '架构师', icon: '🏗️', status: 'offline', role: '系统设计', skills: AGENT_SKILLS.architect },
                    { id: 'researcher', name: '研究员', icon: '🔍', status: 'offline', role: '信息调研', skills: AGENT_SKILLS.researcher },
                    { id: 'editor', name: '编辑', icon: '✍️', status: 'offline', role: '内容创作', skills: AGENT_SKILLS.editor }
                ];
            }
        };

        // ========================================
        // Main Application
        // ========================================
        class AgentOS {
            constructor() {
                this.state = new StateManager();
                this.ws = new WebSocketManager(CONFIG.WS_URL);
                this.renderer = new RenderManager(this.state);
                this.loading = { selecting: false, sending: false };
                
                // 同步控制
                this.syncIntervals = {
                    time: null,
                    data: null
                };
                this.syncPausedAt = null;

                this.init();
            }

            async init() {
                toast.init();

                // Initialize state
                this.state.set('userId', storage.getUserId());
                this.state.set('messages', storage.get('messages', []));
                this.state.set('selectedAgent', storage.get('selectedAgent'));

                // Bind events
                this.bindEvents();
                this.bindWebSocketEvents();

                // Start timers
                this.startTimers();

                // Initial data load
                await this.loadAgents();

                // Connect WebSocket
                this.ws.connect();

                // Render initial state
                this.renderer.renderMessages(this.state.get('messages'));
                await this.renderer.renderTasks();

                toast.success('AgentOS 已启动', '系统初始化完成');
            }

            bindEvents() {
                // Agent list click (event delegation)
                this.renderer.elements.agentList?.addEventListener('click', (e) => {
                    const item = e.target.closest('.agent-item[data-agent-id]');
                    if (item) {
                        this.selectAgent(item.dataset.agentId, item);
                    }
                });

                // Workspace interactions (event delegation)
                this.renderer.elements.workspaceContent?.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;

                    e.preventDefault();
                    e.stopPropagation();

                    const action = btn.dataset.action;

                    if (action === 'quick' && btn.dataset.message) {
                        this.sendQuickMessage(btn.dataset.message);
                    } else if (action === 'send') {
                        this.sendMessage();
                    }
                });

                // Chat header actions
                document.querySelector('.chat-actions')?.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;

                    const action = btn.dataset.action;
                    if (action === 'export') this.exportMessages();
                    if (action === 'clear') this.clearMessages();
                });

                // Message input enter key
                this.renderer.elements.workspaceContent?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && e.target.classList.contains('message-input')) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                // Message card actions
                this.renderer.elements.chatMessages?.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;

                    const action = btn.dataset.action;
                    if (action === 'copy' && btn.dataset.text) {
                        this.copyToClipboard(btn.dataset.text);
                    } else if (action === 'reply' && btn.dataset.sender) {
                        this.setReplyTo(btn.dataset.sender);
                    }
                });

                // Topology node clicks
                document.addEventListener('click', (e) => {
                    const node = e.target.closest('.topology-node[data-agent-id]');
                    if (node) {
                        this.selectAgent(node.dataset.agentId);
                    }
                });
            }

            bindWebSocketEvents() {
                this.ws.on('connected', () => {
                    this.state.set('connectionStatus', 'connected');
                    this.renderer.updateConnectionStatus('connected');
                });

                this.ws.on('disconnected', () => {
                    this.state.set('connectionStatus', 'disconnected');
                    this.renderer.updateConnectionStatus('disconnected');
                });

                this.ws.on('reconnecting', ({ attempt }) => {
                    this.state.set('connectionStatus', 'reconnecting');
                    this.renderer.updateConnectionStatus('reconnecting');
                });

                this.ws.on('reconnect_failed', () => {
                    toast.error('连接失败', '无法连接到服务器，请检查网络');
                });

                this.ws.on('message', async (data) => {
                    await this.handleWebSocketMessage(data);
                });
            }

            async handleWebSocketMessage(data) {
                switch (data.type) {
                    case 'history':
                        if (data.messages?.length > 0) {
                            this.state.set('messages', data.messages);
                            storage.set('messages', data.messages);
                            this.renderer.renderMessages(data.messages);
                        }
                        break;

                    case 'agents_update':
                        const agents = data.agents.map(a => ({
                            ...a,
                            skills: AGENT_SKILLS[a.id] || []
                        }));
                        this.state.set('agents', agents);
                        this.renderer.renderAgentList(agents, this.state.get('selectedAgent'));
                        await this.renderer.renderTasks();
                        break;

                    case 'message':
                        const messages = this.state.get('messages');
                        if (!messages.find(m => m.id === data.id)) {
                            messages.push(data);
                            this.state.set('messages', messages);
                            storage.set('messages', messages);
                            this.renderer.renderMessages(messages);
                        }
                        break;

                    case 'error':
                        toast.error('服务器错误', data.message);
                        break;
                }
            }

            async loadAgents() {
                const agents = await api.fetchAgents();
                this.state.set('agents', agents);
                this.renderer.renderAgentList(agents, this.state.get('selectedAgent'));

                const selected = this.state.get('selectedAgent');
                if (selected) {
                    const agent = agents.find(a => a.id === selected);
                    if (agent) {
                        this.renderer.renderWorkspace(agent);
                    }
                }
            }

            selectAgent = utils.debounce(async (agentId, element) => {
                if (this.loading.selecting || this.state.get('selectedAgent') === agentId) return;

                this.loading.selecting = true;
                element?.classList.add('loading');

                try {
                    this.state.set('selectedAgent', agentId);
                    storage.set('selectedAgent', agentId);

                    const agent = this.state.get('agents').find(a => a.id === agentId);
                    if (agent) {
                        this.renderer.renderAgentList(this.state.get('agents'), agentId);
                        this.renderer.renderWorkspace(agent);
                    }
                } catch (error) {
                    toast.error('选择失败', error.message);
                } finally {
                    this.loading.selecting = false;
                    element?.classList.remove('loading');
                }
            }, CONFIG.SELECT_DEBOUNCE);

            sendMessage = utils.debounce(async () => {
                if (this.loading.sending) return;

                const input = document.getElementById('message-input');
                const text = input?.value.trim();

                if (!text) return;

                const selectedAgent = this.state.get('selectedAgent');
                if (!selectedAgent) {
                    toast.warning('提示', '请先选择一个智能体');
                    return;
                }

                this.loading.sending = true;
                input.disabled = true;

                try {
                    input.value = '';
                    const success = await api.sendMessage(
                        selectedAgent,
                        text,
                        this.state.get('userId')
                    );

                    if (success) {
                        this.addLocalMessage('你', '👤', text, true);
                    } else {
                        input.value = text;
                        toast.error('发送失败', '请稀后重试');
                    }
                } catch (error) {
                    input.value = text;
                    toast.error('发送失败', error.message);
                } finally {
                    this.loading.sending = false;
                    input.disabled = false;
                    input.focus();
                }
            }, CONFIG.SEND_DEBOUNCE);

            async sendQuickMessage(message) {
                const selectedAgent = this.state.get('selectedAgent');
                if (!selectedAgent) {
                    toast.warning('提示', '请先选择一个智能体');
                    return;
                }

                const agent = this.state.get('agents').find(a => a.id === selectedAgent);
                const fullMessage = `@${agent.name} ${message}`;

                const success = await api.sendMessage(
                    selectedAgent,
                    fullMessage,
                    this.state.get('userId')
                );

                if (success) {
                    this.addLocalMessage('你', '👤', fullMessage, true);
                }
            }

            addLocalMessage(sender, icon, text, own) {
                const message = {
                    id: utils.generateId(),
                    sender,
                    icon,
                    text,
                    time: utils.formatTime(),
                    own,
                    timestamp: Date.now()
                };

                const messages = [...this.state.get('messages'), message];
                this.state.set('messages', messages);
                storage.set('messages', messages.slice(-CONFIG.MESSAGE_CACHE_SIZE));
                this.renderer.renderMessages(messages);
            }

            async clearMessages() {
                if (!confirm('确定要清除所有聊天记录吗？')) return;

                const success = await api.clearMessages();
                if (success) {
                    this.state.set('messages', []);
                    storage.remove('messages');
                    this.renderer.renderMessages([]);
                    toast.success('已清除', '聊天记录已清除');
                } else {
                    toast.error('清除失败', '请稀后重试');
                }
            }

            exportMessages() {
                const messages = this.state.get('messages');
                if (messages.length === 0) {
                    toast.warning('提示', '没有消息可导出');
                    return;
                }

                const data = {
                    exportedAt: new Date().toISOString(),
                    totalMessages: messages.length,
                    messages
                };

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `agentos-messages-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                toast.success('导出成功', `已导出 ${messages.length} 条消息`);
            }

            async copyToClipboard(text) {
                try {
                    await navigator.clipboard.writeText(text);
                    toast.success('已复制', '内容已复制到剪贴板');
                } catch (error) {
                    toast.error('复制失败', error.message);
                }
            }

            setReplyTo(sender) {
                const input = document.getElementById('message-input');
                if (input) {
                    input.value = `@${sender} `;
                    input.focus();
                }
            }

            // ========================================
            // 页面可见性控制 - 节省Token
            // ========================================
            startSync() {
                if (this.syncIntervals.data) return; // 已经在运行
                
                // 立即执行一次
                this.loadAgents();
                
                // 启动定期同步 (5秒间隔)
                const refresh = utils.throttle(() => {
                    this.loadAgents();
                }, 5000);
                
                this.syncIntervals.data = setInterval(refresh, 5000);
                
                // 时间更新继续运行
                if (!this.syncIntervals.time) {
                    this.syncIntervals.time = setInterval(() => {
                        if (this.renderer.elements.headerTime) {
                            this.renderer.elements.headerTime.textContent = utils.formatTime();
                        }
                    }, 1000);
                }
                
                // 如果有暂停时间，显示恢复提示
                if (this.syncPausedAt) {
                    const pausedMinutes = Math.floor((Date.now() - this.syncPausedAt) / 60000);
                    if (pausedMinutes > 0) {
                        toast.info('同步已恢复', `暂停了 ${pausedMinutes} 分钟，已自动刷新数据`);
                    }
                    this.syncPausedAt = null;
                }
                
                // 更新视觉指示器
                this.updateSyncIndicator(true);
            }

            stopSync() {
                // 停止数据同步 (保留时间更新)
                if (this.syncIntervals.data) {
                    clearInterval(this.syncIntervals.data);
                    this.syncIntervals.data = null;
                }
                
                this.syncPausedAt = Date.now();
                
                // 更新视觉指示器
                this.updateSyncIndicator(false);
            }

            updateSyncIndicator(isRunning) {
                // 查找或创建同步状态指示器
                let indicator = document.getElementById('sync-indicator');
                
                if (!indicator) {
                    indicator = document.createElement('div');
                    indicator.id = 'sync-indicator';
                    indicator.style.cssText = `
                        position: fixed;
                        bottom: 10px;
                        right: 10px;
                        padding: 6px 12px;
                        border-radius: 20px;
                        font-size: 12px;
                        font-weight: 500;
                        z-index: 9999;
                        transition: all 0.3s ease;
                        backdrop-filter: blur(10px);
                    `;
                    document.body.appendChild(indicator);
                }
                
                if (isRunning) {
                    indicator.textContent = '🟢 实时同步中';
                    indicator.style.background = 'rgba(16, 185, 129, 0.2)';
                    indicator.style.color = '#10b981';
                    indicator.style.border = '1px solid rgba(16, 185, 129, 0.3)';
                } else {
                    indicator.textContent = '⏸️ 同步已暂停';
                    indicator.style.background = 'rgba(245, 158, 11, 0.2)';
                    indicator.style.color = '#f59e0b';
                    indicator.style.border = '1px solid rgba(245, 158, 11, 0.3)';
                }
            }

            startTimers() {
                // 启动同步
                this.startSync();
                
                // 监听页面可见性变化
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        // 页面隐藏 → 停止同步
                        this.stopSync();
                        console.log('📴 页面进入后台，暂停数据同步以节省Token');
                    } else {
                        // 页面显示 → 恢复同步
                        this.startSync();
                        console.log('📱 页面回到前台，恢复数据同步');
                    }
                });
                
                // 页面获得焦点时额外检查
                window.addEventListener('focus', () => {
                    if (!this.syncIntervals.data) {
                        this.startSync();
                    }
                });
            }
        }

        // ========================================
        // Initialize Application
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            window.agentOS = new AgentOS();
        });
    </script>
</body>
</html>
