<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多 Agent 协作工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* 主布局 */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
            gap: 1px;
            background: #2a2a2a;
        }

        /* 顶部导航 */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #3a3a3a;
        }

        .header h1 {
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #1a3a1a;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 左侧边栏 - Agent 列表 */
        .sidebar {
            background: #1a1a1a;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #2a2a2a;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .agent-list {
            padding: 10px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: #252525;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .agent-item:hover {
            background: #2a2a2a;
            transform: translateX(3px);
        }

        .agent-item.active {
            background: #2a2a2a;
            border-left-color: #667eea;
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            position: relative;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #1a1a1a;
        }

        .status-dot.idle { background: #28a745; }
        .status-dot.busy { background: #ffc107; }
        .status-dot.offline { background: #6c757d; }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 500;
            margin-bottom: 3px;
        }

        .agent-task {
            font-size: 0.8em;
            color: #888;
        }

        .agent-status-badge {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .agent-status-badge.idle { background: #1a3a1a; color: #28a745; }
        .agent-status-badge.busy { background: #3a3a1a; color: #ffc107; }
        .agent-status-badge.offline { background: #2a2a2a; color: #6c757d; }

        /* 中间工作区 */
        .workspace {
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
        }

        .workspace-header {
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .workspace-tabs {
            display: flex;
            gap: 10px;
        }

        .tab {
            padding: 8px 16px;
            background: #252525;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #667eea;
        }

        .tab:hover:not(.active) {
            background: #2a2a2a;
        }

        .workspace-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Agent 详情卡片 */
        .agent-detail-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .agent-detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .agent-detail-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #252525;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .agent-detail-info h2 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .agent-detail-info p {
            color: #888;
            margin-bottom: 10px;
        }

        .skill-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .skill-tag {
            padding: 4px 10px;
            background: #252525;
            border-radius: 12px;
            font-size: 0.8em;
            border: 1px solid #3a3a3a;
        }

        /* 当前任务 */
        .current-task {
            background: #252525;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .current-task h3 {
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #888;
        }

        .task-progress {
            background: #1a1a1a;
            border-radius: 4px;
            height: 6px;
            margin-top: 10px;
            overflow: hidden;
        }

        .task-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s;
        }

        /* 交互区 */
        .interaction-area {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .interaction-area h3 {
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #888;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 8px 16px;
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #667eea;
            border-color: #667eea;
        }

        .message-input-area {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95em;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 20px;
            background: #667eea;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        /* 右侧 - 实时聊天区 */
        .chat-panel {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            background: #252525;
            border-bottom: 1px solid #2a2a2a;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sync-status {
            font-size: 0.8em;
            color: #28a745;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .chat-message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .chat-message-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #252525;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
        }

        .chat-message-sender {
            font-weight: 500;
            font-size: 0.9em;
        }

        .chat-message-time {
            font-size: 0.75em;
            color: #666;
        }

        .chat-message-text {
            padding: 10px;
            background: #252525;
            border-radius: 8px;
            font-size: 0.9em;
            line-height: 1.5;
            margin-left: 32px;
        }

        .chat-message.own .chat-message-text {
            background: #2a3a5a;
        }

        /* 任务看板 */
        .task-board {
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .task-board-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .task-item {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item-title {
            font-size: 0.9em;
        }

        .task-item-meta {
            display: flex;
            gap: 10px;
            font-size: 0.8em;
            color: #888;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        /* 输入框 */
        input, textarea {
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <div class="header">
            <h1>🤖 多 Agent 协作工作台</h1>
            <div class="header-right">
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span>实时同步中</span>
                </div>
                <span style="color: #888; font-size: 0.9em;" id="current-time"></span>
            </div>
        </div>

        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span>团队成员</span>
                <span style="color: #888; font-size: 0.85em;">6 在线</span>
            </div>
            <div class="agent-list" id="agent-list">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 中间工作区 -->
        <div class="workspace">
            <div class="workspace-header">
                <div class="workspace-tabs">
                    <div class="tab active" data-tab="agent">👤 Agent 详情</div>
                    <div class="tab" data-tab="tasks">📋 任务看板</div>
                    <div class="tab" data-tab="analytics">📊 数据分析</div>
                </div>
                <div>
                    <button class="action-btn" onclick="assignTask()">➕ 分配任务</button>
                </div>
            </div>
            <div class="workspace-content" id="workspace-content">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 右侧聊天区 -->
        <div class="chat-panel">
            <div class="chat-header">
                <span>💬 团队频道</span>
                <span class="sync-status">● 已连接</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- 动态生成 -->
            </div>
            
            <!-- 任务看板 -->
            <div class="task-board">
                <div class="task-board-header">
                    <span>📋 进行中的任务</span>
                    <span style="color: #888; font-size: 0.85em;" id="task-count">3 个任务</span>
                </div>
                <div id="task-list">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据模型
        const state = {
            agents: [
                { id: 'main', name: '小松', icon: '🐿️', status: 'idle', role: '主 Agent', skills: ['任务分发', '协调沟通', '项目管理'], task: null, progress: 0 },
                { id: 'assistant', name: '管家', icon: '🤵', status: 'idle', role: '日程管理', skills: ['日程创建', '提醒设置', '会议安排'], task: null, progress: 0 },
                { id: 'coder', name: '工程师', icon: '💻', status: 'busy', role: '代码开发', skills: ['前端开发', '后端开发', 'Bug修复'], task: '开发 FeishuBot-Pro 项目', progress: 65 },
                { id: 'architect', name: '架构师', icon: '🏗️', status: 'idle', role: '系统设计', skills: ['架构设计', '技术选型', '性能优化'], task: null, progress: 0 },
                { id: 'researcher', name: '研究员', icon: '🔍', status: 'busy', role: '信息调研', skills: ['市场分析', '技术调研', '数据收集'], task: '分析 2024-2025 开发趋势', progress: 40 },
                { id: 'editor', name: '编辑', icon: '✍️', status: 'idle', role: '内容创作', skills: ['文案撰写', '文档整理', '报告生成'], task: null, progress: 0 }
            ],
            selectedAgent: null,
            messages: [
                { id: 1, sender: '小松', icon: '🐿️', text: '收到用户需求：创建协作工作台 UI', time: '22:12:05', own: false },
                { id: 2, sender: '架构师', icon: '🏗️', text: '建议使用三栏布局：左侧 Agent 列表、中间工作区、右侧实时聊天', time: '22:12:15', own: false },
                { id: 3, sender: '工程师', icon: '💻', text: '好的，我正在处理 FeishuBot-Pro，稍后可以协助', time: '22:12:25', own: false },
                { id: 4, sender: '小松', icon: '🐿️', text: '明白了，我先快速搭建基础框架', time: '22:12:35', own: false }
            ],
            tasks: [
                { id: 1, title: 'FeishuBot-Pro 项目搭建', assignedTo: '工程师', priority: 'high', progress: 65 },
                { id: 2, title: '开发趋势分析报告', assignedTo: '研究员', priority: 'medium', progress: 40 },
                { id: 3, title: '协作工作台 UI 开发', assignedTo: '小松', priority: 'high', progress: 85 }
            ]
        };

        // 渲染 Agent 列表
        function renderAgentList() {
            const container = document.getElementById('agent-list');
            container.innerHTML = state.agents.map(agent => `
                <div class="agent-item ${state.selectedAgent === agent.id ? 'active' : ''}" 
                     onclick="selectAgent('${agent.id}')">
                    <div class="agent-avatar">
                        ${agent.icon}
                        <div class="status-dot ${agent.status}"></div>
                    </div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-task">${agent.task || agent.role}</div>
                    </div>
                    <div class="agent-status-badge ${agent.status}">
                        ${agent.status === 'idle' ? '空闲' : agent.status === 'busy' ? '忙碌' : '离线'}
                    </div>
                </div>
            `).join('');
        }

        // 选择 Agent
        function selectAgent(agentId) {
            state.selectedAgent = agentId;
            renderAgentList();
            renderWorkspace();
        }

        // 渲染工作区
        function renderWorkspace() {
            const agent = state.agents.find(a => a.id === state.selectedAgent) || state.agents[0];
            const container = document.getElementById('workspace-content');

            container.innerHTML = `
                <div class="agent-detail-card">
                    <div class="agent-detail-header">
                        <div class="agent-detail-avatar">${agent.icon}</div>
                        <div class="agent-detail-info">
                            <h2>${agent.name}</h2>
                            <p>${agent.role}</p>
                            <div class="skill-tags">
                                ${agent.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    
                    ${agent.task ? `
                        <div class="current-task">
                            <h3>当前任务</h3>
                            <div>${agent.task}</div>
                            <div class="task-progress">
                                <div class="task-progress-bar" style="width: ${agent.progress}%"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.85em; color: #888;">
                                <span>进度</span>
                                <span>${agent.progress}%</span>
                            </div>
                        </div>
                    ` : `
                        <div class="current-task" style="text-align: center; color: #888;">
                            <h3>当前状态</h3>
                            <div>空闲中，等待任务分配</div>
                        </div>
                    `}
                    
                    <div class="interaction-area">
                        <h3>快速交互</h3>
                        <div class="quick-actions">
                            <button class="action-btn" onclick="sendQuickMessage('${agent.id}', '请帮我分析一下这个需求')">📋 分配任务</button>
                            <button class="action-btn" onclick="sendQuickMessage('${agent.id}', '请汇报当前进度')">📊 查看进度</button>
                            <button class="action-btn" onclick="sendQuickMessage('${agent.id}', '请提供设计建议')">💡 征求建议</button>
                        </div>
                        <div class="message-input-area">
                            <input type="text" class="message-input" id="message-input" 
                                   placeholder="输入消息..." 
                                   onkeypress="if(event.key==='Enter') sendMessage('${agent.id}')">
                            <button class="send-btn" onclick="sendMessage('${agent.id}')">发送</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染聊天消息
        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = state.messages.map(msg => `
                <div class="chat-message ${msg.own ? 'own' : ''}">
                    <div class="chat-message-header">
                        <div class="chat-message-avatar">${msg.icon}</div>
                        <span class="chat-message-sender">${msg.sender}</span>
                        <span class="chat-message-time">${msg.time}</span>
                    </div>
                    <div class="chat-message-text">${msg.text}</div>
                </div>
            `).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 渲染任务列表
        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = state.tasks.map(task => `
                <div class="task-item">
                    <div class="task-item-title">${task.title}</div>
                    <div class="task-item-meta">
                        <span>👤 ${task.assignedTo}</span>
                        <span>${task.progress}%</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('task-count').textContent = `${state.tasks.length} 个任务`;
        }

        // 发送消息
        function sendMessage(agentId) {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage('你', '👤', text, true);
            input.value = '';

            // 模拟 Agent 回复
            setTimeout(() => {
                const agent = state.agents.find(a => a.id === agentId);
                const responses = [
                    '收到！我正在处理...',
                    '好的，马上开始执行',
                    '明白了，我会优先处理这个任务',
                    '建议我们可以这样进行...'
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage(agent.name, agent.icon, response, false);
            }, 1000);
        }

        // 发送快速消息
        function sendQuickMessage(agentId, message) {
            const agent = state.agents.find(a => a.id === agentId);
            addMessage('你', '👤', `@${agent.name} ${message}`, true);

            setTimeout(() => {
                const responses = {
                    '请帮我分析一下这个需求': '好的，我来分析一下这个需求的关键点...',
                    '请汇报当前进度': `目前任务进度 ${agent.progress}%，预计还需要完成...`,
                    '请提供设计建议': '根据我的经验，建议采用以下方案...'
                };
                addMessage(agent.name, agent.icon, responses[message] || '收到！', false);
            }, 1500);
        }

        // 添加消息
        function addMessage(sender, icon, text, own) {
            const time = new Date().toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            state.messages.push({
                id: state.messages.length + 1,
                sender,
                icon,
                text,
                time,
                own
            });
            
            renderMessages();
        }

        // 分配任务
        function assignTask() {
            const task = prompt('请输入任务描述：');
            if (!task) return;

            const availableAgents = state.agents.filter(a => a.status === 'idle');
            if (availableAgents.length === 0) {
                alert('暂无空闲 Agent');
                return;
            }

            const agentNames = availableAgents.map(a => a.name).join(', ');
            const assignee = prompt(`可用的 Agent：${agentNames}\n请输入要分配的 Agent 名称：`);
            
            const agent = availableAgents.find(a => a.name === assignee);
            if (agent) {
                agent.status = 'busy';
                agent.task = task;
                agent.progress = 0;
                
                state.tasks.push({
                    id: state.tasks.length + 1,
                    title: task,
                    assignedTo: agent.name,
                    priority: 'medium',
                    progress: 0
                });
                
                addMessage('你', '👤', `@${agent.name} 分配任务：${task}`, true);
                
                setTimeout(() => {
                    addMessage(agent.name, agent.icon, '收到任务，开始执行！', false);
                }, 1000);
                
                renderAgentList();
                renderWorkspace();
                renderTasks();
            }
        }

        // 更新时间
        function updateTime() {
            document.getElementById('current-time').textContent = 
                new Date().toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
        }

        // 模拟实时更新
        function simulateRealtime() {
            // 随机更新进度
            state.tasks.forEach(task => {
                if (task.progress < 100 && Math.random() > 0.7) {
                    task.progress = Math.min(100, task.progress + Math.floor(Math.random() * 10));
                    
                    // 更新对应的 Agent
                    const agent = state.agents.find(a => a.name === task.assignedTo);
                    if (agent) {
                        agent.progress = task.progress;
                    }
                }
            });
            
            // 随机 Agent 消息
            if (Math.random() > 0.9) {
                const busyAgents = state.agents.filter(a => a.status === 'busy');
                if (busyAgents.length > 0) {
                    const agent = busyAgents[Math.floor(Math.random() * busyAgents.length)];
                    const updates = [
                        '任务有新进展...',
                        '遇到一个问题，需要协助',
                        '模块开发完成',
                        '正在进行测试'
                    ];
                    addMessage(agent.name, agent.icon, updates[Math.floor(Math.random() * updates.length)], false);
                }
            }
            
            renderTasks();
            renderAgentList();
            renderWorkspace();
        }

        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // 这里可以切换不同的视图
            });
        });

        // 初始化
        function init() {
            state.selectedAgent = 'main';
            renderAgentList();
            renderWorkspace();
            renderMessages();
            renderTasks();
            
            // 定时更新
            setInterval(updateTime, 1000);
            setInterval(simulateRealtime, 5000);
        }

        init();
    </script>
</body>
</html>
