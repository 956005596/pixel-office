<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多 Agent 协作面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* Agent 状态 */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .agent-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #ccc;
            transition: all 0.3s;
        }

        .agent-card.idle {
            border-left-color: #28a745;
        }

        .agent-card.busy {
            border-left-color: #ffc107;
        }

        .agent-card.offline {
            border-left-color: #6c757d;
        }

        .agent-card h3 {
            font-size: 1.1em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-icon {
            font-size: 1.5em;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.idle {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.busy {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.offline {
            background: #e2e3e5;
            color: #383d41;
        }

        .agent-task {
            font-size: 0.9em;
            color: #666;
            margin-top: 8px;
        }

        /* 沟通记录 */
        .messages {
            max-height: 400px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .message-sender {
            font-weight: bold;
            color: #333;
        }

        .message-time {
            font-size: 0.85em;
            color: #999;
        }

        .message-text {
            color: #555;
            line-height: 1.5;
        }

        /* 任务列表 */
        .tasks {
            max-height: 400px;
            overflow-y: auto;
        }

        .task {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: bold;
            color: #333;
        }

        .task-priority {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .priority-high {
            background: #f8d7da;
            color: #721c24;
        }

        .priority-medium {
            background: #fff3cd;
            color: #856404;
        }

        .priority-low {
            background: #d4edda;
            color: #155724;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #666;
        }

        .task-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            background: #cce5ff;
            color: #004085;
        }

        /* 统计信息 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* 操作按钮 */
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* 刷新动画 */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .refreshing {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 多 Agent 协作面板</h1>
            <p>实时监控 Agent 状态、沟通记录和任务进度</p>
        </header>

        <!-- 统计信息 -->
        <div class="card full-width">
            <h2>📊 实时统计</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-agents">6</div>
                    <div class="stat-label">Agent 总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="active-agents">4</div>
                    <div class="stat-label">活跃 Agent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="running-tasks">2</div>
                    <div class="stat-label">进行中任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-messages">15</div>
                    <div class="stat-label">今日消息</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <!-- Agent 状态 -->
            <div class="card">
                <h2>👥 Agent 状态</h2>
                <div class="agent-grid" id="agents-container">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="card">
                <h2>📋 推进中的任务</h2>
                <div class="tasks" id="tasks-container">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 沟通记录 -->
        <div class="card full-width">
            <h2>💬 协作沟通记录</h2>
            <div class="messages" id="messages-container">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="card full-width">
            <div class="actions">
                <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
                <button class="btn btn-secondary" onclick="addTask()">➕ 新建任务</button>
                <button class="btn btn-secondary" onclick="simulateMessage()">💬 模拟消息</button>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const agents = [
            { id: 'main', name: '小松', icon: '🐿️', status: 'idle', task: null, role: '主 Agent' },
            { id: 'assistant', name: '管家', icon: '🤵', status: 'idle', task: null, role: '日程管理' },
            { id: 'coder', name: '工程师', icon: '💻', status: 'busy', task: '开发 FeishuBot-Pro', role: '代码开发' },
            { id: 'architect', name: '架构师', icon: '🏗️', status: 'idle', task: null, role: '系统设计' },
            { id: 'researcher', name: '研究员', icon: '🔍', status: 'busy', task: '分析 2024-2025 开发趋势', role: '信息调研' },
            { id: 'editor', name: '编辑', icon: '✍️', status: 'idle', task: null, role: '内容创作' }
        ];

        const tasks = [
            { id: 1, title: 'FeishuBot-Pro 项目搭建', priority: 'high', status: 'in_progress', assignedTo: '工程师', createdAt: '22:10' },
            { id: 2, title: 'AgentFlow 项目搭建', priority: 'high', status: 'completed', assignedTo: '工程师', createdAt: '21:50' },
            { id: 3, title: '开发趋势分析报告', priority: 'medium', status: 'in_progress', assignedTo: '研究员', createdAt: '21:30' },
            { id: 4, title: '多 Agent 协作 UI 开发', priority: 'high', status: 'in_progress', assignedTo: '小松', createdAt: '22:12' }
        ];

        const messages = [
            { sender: '小松', icon: '🐿️', text: '大家好！收到用户任务：开发协作 UI', time: '22:12:05' },
            { sender: '工程师', icon: '💻', text: '收到！我正在处理 FeishuBot-Pro 项目', time: '22:12:10' },
            { sender: '架构师', icon: '🏗️', text: 'UI 设计建议使用卡片式布局，实时显示 Agent 状态', time: '22:12:25' },
            { sender: '小松', icon: '🐿️', text: '好的，我来快速实现这个界面', time: '22:12:30' },
            { sender: '研究员', icon: '🔍', text: '补充：可以加个统计面板显示总体情况', time: '22:12:40' }
        ];

        // 渲染 Agent 状态
        function renderAgents() {
            const container = document.getElementById('agents-container');
            container.innerHTML = agents.map(agent => `
                <div class="agent-card ${agent.status}">
                    <h3>
                        <span class="agent-icon">${agent.icon}</span>
                        ${agent.name}
                        <span class="status-badge ${agent.status}">
                            ${agent.status === 'idle' ? '空闲' : agent.status === 'busy' ? '忙碌' : '离线'}
                        </span>
                    </h3>
                    <div class="agent-task">${agent.role}</div>
                    ${agent.task ? `<div class="agent-task">🎯 ${agent.task}</div>` : ''}
                </div>
            `).join('');

            // 更新统计
            document.getElementById('active-agents').textContent = 
                agents.filter(a => a.status !== 'offline').length;
        }

        // 渲染任务列表
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = tasks.map(task => `
                <div class="task">
                    <div class="task-header">
                        <span class="task-title">${task.title}</span>
                        <span class="task-priority priority-${task.priority}">
                            ${task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}
                        </span>
                    </div>
                    <div class="task-meta">
                        <span>👤 ${task.assignedTo}</span>
                        <span>⏰ ${task.createdAt}</span>
                        <span class="task-status">${task.status === 'in_progress' ? '进行中' : '已完成'}</span>
                    </div>
                </div>
            `).join('');

            // 更新统计
            document.getElementById('running-tasks').textContent = 
                tasks.filter(t => t.status === 'in_progress').length;
        }

        // 渲染消息记录
        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-avatar">${msg.icon}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">${msg.sender}</span>
                            <span class="message-time">${msg.time}</span>
                        </div>
                        <div class="message-text">${msg.text}</div>
                    </div>
                </div>
            `).join('');

            // 滚动到底部
            container.scrollTop = container.scrollHeight;

            // 更新统计
            document.getElementById('total-messages').textContent = messages.length;
        }

        // 刷新数据
        function refreshData() {
            const btn = event.target;
            btn.classList.add('refreshing');
            
            setTimeout(() => {
                renderAgents();
                renderTasks();
                renderMessages();
                btn.classList.remove('refreshing');
            }, 500);
        }

        // 添加任务
        function addTask() {
            const title = prompt('请输入任务标题：');
            if (title) {
                tasks.unshift({
                    id: tasks.length + 1,
                    title,
                    priority: 'medium',
                    status: 'in_progress',
                    assignedTo: '待分配',
                    createdAt: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                });
                renderTasks();
            }
        }

        // 模拟消息
        function simulateMessage() {
            const randomAgents = agents.filter(a => a.status !== 'offline');
            const sender = randomAgents[Math.floor(Math.random() * randomAgents.length)];
            
            messages.push({
                sender: sender.name,
                icon: sender.icon,
                text: '收到任务更新，正在处理中...',
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
            });
            
            renderMessages();
        }

        // 初始化渲染
        renderAgents();
        renderTasks();
        renderMessages();

        // 自动刷新（每 30 秒）
        setInterval(() => {
            // 这里可以添加真实的 API 调用
            console.log('Auto refresh...');
        }, 30000);
    </script>
</body>
</html>
